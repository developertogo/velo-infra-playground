apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-gateway
  namespace: default
  labels:
    app: sentinel-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-gateway
  template:
    metadata:
      labels:
        app: sentinel-gateway
    spec:
      containers:
      - name: sentinel
        image: velo-sentinel:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
        envFrom:
        - configMapRef:
            name: sentinel-config
        resources:
          limits:
            cpu: "1"
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
